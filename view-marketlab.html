  <style>
    :root {
      --bg: #05080f;
      --text: #e8eef8;
      --muted: #8fa3c4;
      --blue: #0052ff;
      --line: #1a2740;
      --card: #0c1220;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--card);
    }
    .bar a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.92rem;
    }
    .bar a:hover { color: #fff; }
    .bar strong { font-size: 0.98rem; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .actions a {
      background: var(--blue);
      color: #fff !important;
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: 600;
    }
    .actions a.ghost {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text) !important;
    }
    iframe {
      flex: 1;
      width: 100%;
      border: 0;
      background: #111;
